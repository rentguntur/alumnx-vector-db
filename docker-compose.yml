services:
  vector-db:
    build: .
    container_name: ${CONTAINER_NAME:-alumnx-vector-db}
    ports:
      - "8000:8000"
    volumes:
      - ./vector_store:/app/vector_store
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
